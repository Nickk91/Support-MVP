services:
  # React Client (Static Site)
  - type: web
    name: support-mvp-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://support-mvp-server.onrender.com
      - key: REACT_APP_RAG_URL
        value: https://support-mvp-python.onrender.com

  # Express Server
  - type: web
    name: support-mvp-server
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RAG_API_URL
        value: https://support-mvp-python.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://support-mvp-client.onrender.com

  # Python RAG API
  - type: web
    name: support-mvp-python
    env: python
    buildCommand: cd python && pip install -r requirements.txt
    startCommand: cd python && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PINECONE_API_KEY
        value: your_actual_pinecone_api_key_here
      - key: OPENAI_API_KEY
        value: your_actual_openai_api_key_here
      - key: RAG_VECTOR_BACKEND
        value: pinecone
      - key: APP_ENV
        value: production
      - key: EXPRESS_SERVER_URL
        value: https://support-mvp-server.onrender.com
